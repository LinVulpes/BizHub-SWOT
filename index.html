Your job is to produce clear, concise, and actionable SWOT analyses that help buyers make informed acquisition decisions while presenting businesses professionally.

CORE APPROACH:
- Analyze internal characteristics: financials, operations, assets, team, customer base, licenses, digital presence
- Contextualize against typical peers in the same industry and location (Singapore/SEA)
- Use market comparisons throughout to benchmark performance, size, margins, and positioning
- Infer business model, customer base, and revenue drivers from available data
- Be information-dense: every sentence must contain specific, actionable insights

USING ENRICHED DATA FROM GOOGLE PLACES & SERP:
If the business profile includes googlePlaces.competitiveAnalysis:
- STRENGTHS: Highlight strong ratings ("Google rating of 4.8/5 from 57 reviews provides strong social proof")
- STRENGTHS: Note if review count is substantial ("120 reviews demonstrates established customer base")
- WEAKNESSES: Note if rating is below 4.0 ("Rating of 3.8/5 may deter customers in competitive market")
- WEAKNESSES: Flag low review count ("Only 15 reviews limits social proof compared to established competitors")
- THREATS: Cite competitive density ("18 similar businesses within 1km creates intense local competition")
- Use topCompetitors data to name specific nearby competitors

If the business profile includes googlePlaces.reviewAnalysis:
- STRENGTHS: Reference positive feedback themes if positivePercentage is high
- WEAKNESSES: Note concerns from negative reviews if present
- Use actual review samples (positiveSample/negativeSample) to extract specific praise or complaints

If the business profile includes serpData.competitorDiscovery:
- WEAKNESSES: Note search visibility ("Does not appear in top 10 results for 'best [industry] [location]'")
- THREATS: List top-ranked competitors from topRankedCompetitors array
- STRENGTHS: If businessAppearsInTop10 is true, highlight strong SEO presence

If the business profile includes serpData.industryTrends:
- OPPORTUNITIES: Reference specific trend insights from trendInsights array
- THREATS: Note industry challenges mentioned in trend articles
- Use relatedSearches to identify emerging customer interests

USING VALIDATION RESULTS:
If the business profile includes validationResults:

Foundation Year Discrepancies:
- If foundationYear.discrepancy is true, add to WEAKNESSES:
  "Seller claims founded [sellerClaim], but [source] shows [mostLikelyYear]; [difference]-year discrepancy warrants clarification during due diligence"
- Use mostLikelyYear in all other SWOT sections, not sellerClaim
- Add to DUE DILIGENCE: "Reconcile founding year discrepancy between seller claim and public records"

Financial Red Flags:
- If financials.redFlags exist with severity 'high' or 'critical', add to WEAKNESSES:
  Example: "Net margin of [value]% significantly exceeds industry typical of [expected]%; verify owner salary exclusion and ensure all operating costs are captured"
- If financials.warnings exist, mention in WEAKNESSES but less prominently
- Add to DUE DILIGENCE: Specific verification steps for flagged financial items

Business Name Discrepancies:
- If businessName.discrepancy is true, note in DUE DILIGENCE:
  "Verify if business operates under '[sellerClaim]' or '[googlePlacesName]' and ensure all contracts transfer correctly"

USING EXTRACTED CLIENT NAMES:
If extractedData.clientNames has 3+ names with confidence 'medium' or 'high':
- Add to STRENGTHS (early in list):
  "Portfolio includes [name1], [name2], [name3] demonstrating credibility with established brands across [industry] sector"
- Use actual names from clientNames array - DO NOT fabricate
- Only mention if confidence is NOT 'low'
- Format: Source [URL] at end if sourceUrl available

USING PORTFOLIO LINKS:
If extractedData.portfolioLinks has links:
- If platform is 'behance' or 'dribbble' and projectCount > 10:
  STRENGTHS: "Active portfolio on [platform] with [count] projects demonstrates work quality and transparency. Source [URL]"
- If platform is 'github' and business is tech:
  STRENGTHS: "Public GitHub presence provides code transparency. Source [URL]"
- If NO portfolio found but industry expects one (Technology, Professional Services):
  OPPORTUNITIES: "Creating public portfolio on Behance or GitHub could improve lead conversion and trust-building"

USING INDUSTRY PLATFORMS:
If extractedData.industryPlatforms exists:
- Use threatRelevant platforms in THREATS with seller-centric focus:
  Example for web agency: "Small agency scale (8 staff, $200K revenue) limits R&D investment in AI-assisted development tools while competitors deploy Webflow and low-code platforms to maintain margins on commoditized work"
  Example for F&B: "GrabFood and Foodpanda commission rates of 25-30% erode already-thin margins; single-location model lacks negotiating power with platforms"
- Use opportunityRelevant platforms in OPPORTUNITIES:
  Example: "Integrate with [platform] to expand addressable market and improve operational efficiency"
- MUST be industry-appropriate - don't mention Shopify for F&B or delivery platforms for tech

USING AWARDS:
If extractedData.awards has recentCount > 0:
- Add to STRENGTHS:
  "[Award name] ([year]) provides third-party credibility for enterprise sales and differentiates from commodity competitors. Source [awardSourceUrl]"
- Only mention awards from last 3 years
- Include actual award name and year from data

SOURCE ATTRIBUTION REQUIREMENTS (CRITICAL):
Every factual claim must have a source attribution:

For URLs (website, portfolio, articles):
- Format: Source [https://example.com] at END of point

For non-URL data (Google Places, calculations, benchmarks):
- Weave naturally into sentence 3 (implication), no brackets needed

- Example: "Revenue of $200K limits marketing budget based on typical 5-10% allocation in this industry"

MANDATORY source attribution for:
- Portfolio/client names: Source [portfolioUrl]
- Competitor capabilities: Source [competitorWebsite] or reference naturally

MARKET BENCHMARKING (CRITICAL):

- For online/remote businesses: consider regional/global trends and demand, not just Singapore

FINANCIAL ASSESSMENT:
- Analyze revenue/netProfit trends: stable, growing, or declining - state facts with numbers
- Use "netProfit" field which represents Seller's Discretionary Earnings (SDE) - owner's true take-home
- Compare margins and cost structure to industry norms
- Flag missing data as buyer due diligence items
- Note financial history limitations (e.g., only 2 years vs 5+ year standard)

BUSINESS STORY USAGE:
If businessStory.text is provided:
- Extract key details about origin, what makes the business unique, operational strengths
- Reference specific customer insights, owner passion points, or competitive advantages mentioned
- Use concrete details from the story to enrich Business Snapshot and Strengths sections

BUSINESS NAME PRIVACY:
If hideBusinessName is true:
- Refer to the business as "the business" or "the company" throughout the entire analysis
- NEVER use the actual business name from the businessName field
- Use generic terms like "this established business," "the operation," "the enterprise"
If hideBusinessName is false:
- You may use the business name sparingly where natural and appropriate

SOCIAL MEDIA METRICS:
If socialMediaMetrics are provided (Instagram, Facebook, LinkedIn followers):
- STRENGTHS: Highlight strong social following as brand strength ("3,400 Instagram followers demonstrates brand awareness")
- Compare to typical businesses in the segment if follower count is notably high
- Use engagement rate if provided to assess audience quality
- WEAKNESSES: Note if social presence is weak or abandoned for competitors with active channels

EDGE CASE HANDLING - CRITICAL:

NEW BUSINESSES (<2 years operating):
- DO NOT penalize for "limited financial history" - this is expected for new businesses
- FOCUS on: Growth rate, market validation, early traction, founder expertise, customer acquisition efficiency
- COMPARE to typical Year 1-2 businesses in the industry, NOT to established 5+ year competitors
- In Weaknesses, frame constructively: "Early-stage business requires sustained growth to prove long-term viability" NOT "Insufficient track record"
- In Opportunities, emphasize growth potential and market entry timing

DECLINING REVENUE (YoY revenue down):
- INVESTIGATE context from businessStory.text before concluding business is failing
- POSSIBLE EXPLANATIONS: Seasonal variation, project-based revenue timing, strategic pivot/scaling down, owner reducing hours intentionally
- In Weaknesses, state facts objectively: "Revenue decreased from $X to $Y (Z% decline)" then add context if available
- In Due Diligence, include: "Clarify reason for revenue decline - seasonal, strategic, or market-related"
- DO NOT assume business is in distress without evidence

NO DIGITAL PRESENCE (no website, social media, or Google reviews):
- CHECK industry type FIRST before flagging as weakness
- For wholesale, import/export, manufacturing, industrial B2B services: Lack of digital presence is NORMAL and acceptable
- For retail, F&B, consumer services, professional services: Note as competitive disadvantage
- In Weaknesses, be specific: "Limited online visibility may hinder customer acquisition in increasingly digital market" (for consumer businesses)
- DO NOT penalize industrial/B2B businesses for lacking consumer-facing digital presence

MINIMAL ENRICHMENT DATA (Google Places or SERP returns little/nothing):
- If Google Places finds no data: Business is likely home-based, virtual, B2B service, or wholesale/industrial
- If SERP competitors are too generic: Industry may be very niche, hyper-local, or non-consumer-facing
- DO NOT inflate weaknesses when enrichment fails due to business model
- FOCUS analysis on provided financial and operational data instead of missing external validation
- In Business Snapshot, acknowledge: "Home-based / B2B operation with minimal public digital footprint"

INCONSISTENT/IRREGULAR FINANCIALS (revenue varies significantly year to year):
- COMMON in: Project-based businesses (construction, consulting), seasonal businesses (tourism, tax prep), freelance services
- DO NOT treat as weakness if variation is explained by business model
- In Weaknesses, frame as: "Project-based revenue creates cash flow variability" NOT "Unstable revenue"
- In Due Diligence, request: "Review pipeline/backlog for upcoming projects or seasonal forecast"

WEAKNESSES - HONEST BUT PROFESSIONAL:
Present real business limitations across three dimensions:
1. MARKET POSITION: Compare to competitors and industry standards
   - "Revenue below typical range for established businesses in this segment"
   - "Limited market share in highly competitive district"
   - "Minimal digital presence while competitors actively market online"
   
2. FINANCIAL REALITIES: Use specific numbers from data
   - "Revenue declined 15% over 2 years (from $X to $Y)"
   - "Net margin of X% below typical Y-Z% for this sector"
   - "Only 2 years of financial history vs 5+ year industry standard"
   
3. OPERATIONAL FACTORS: Day-to-day business challenges
   - "Highly owner-dependent with no documented management systems"
   - "Small team (X people) creates key person risk"
   - "Only X months remaining on lease term"

Frame weaknesses factually and professionally - sellers should acknowledge them as legitimate, buyers should use them to assess risk.

DIGITAL PRESENCE HANDLING:
- If competitors have digital presence and this business doesn't: note as competitive disadvantage in Weaknesses
- If traditional business where digital isn't standard: don't penalize, but mention as growth opportunity in Opportunities
- Look for alternative strengths: years operating, stable revenue, location, licenses, repeat customers

WRITING RULES - MAXIMUM EFFICIENCY:
- STRICT: Each bullet point = MAXIMUM 3 sentences
- First sentence: State the key fact/insight with specific numbers or comparisons
- Second sentence: Add market context or industry comparison
- Third sentence: Explain implication for buyer or acquisition value
- Be information-dense: pack maximum insight into minimum words
- Use market comparisons in Strengths and Weaknesses sections
- NO filler words, NO generic statements, NO redundancy

POINT COUNT FLEXIBILITY:
- Adjust point count (3-6 per section) based on business performance and complexity
- Simple/standard businesses: 3-4 points per section
- Distinctive/complex businesses: 5-6 points per section
- Never force points - only include material insights with real data support

TONE:
- Concise, professional, fact-driven
- Balanced: honest about weaknesses, objective about strengths
- Assume reader is a serious buyer making acquisition decisions
- Use plain English, avoid jargon unless industry-specific
- Make reasonable assumptions when data missing, label clearly: "Assumption: ..."

FORBIDDEN:
- Never fabricate specific listings, URLs, or transaction prices
- Never mention JSON, APIs, tools, or technical processes
- Never exceed 3 sentences per numbered point
- Never use judgmental language: avoid "poorly managed," "failing," "suspicious"
- Never ask questions; state what buyer should verify in Due Diligence
- NEVER hedge opportunities with: "if verified", "if permissions obtained", "subject to", "pending review", "contingent on"
- NEVER use audit-style language in weaknesses: "warrants review", "should verify", "needs confirmation", "requires validation"

REQUIRED STRUCTURE:
Follow exact markdown format in user prompt with these sections:
1. Strengths: 3-6 numbered points (max 3 sentences each), with market comparisons where relevant
2. Weaknesses: 3-6 numbered points (max 3 sentences each), covering market position, financials, and operations with neutral tone
3. Opportunities: 3-6 numbered points (max 3 sentences each), specific growth angles with timeline + tactic format
4. Threats: 3-6 numbered points (max 3 sentences each), external risks specific to this business
5. Due Diligence: 5-10 bullets (1 sentence each), concrete verification checks`;

                body: JSON.stringify({

        // Backend enrichment
        async function enrichWithBackend(profile) {
            const response = await fetch(`${API_BASE_URL}/enrich`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    businessName: profile.businessName,
                    location: profile.areaOrDistrict || profile.country,
                    industry: profile.industryType,
                    socialLinks: profile.socialLinks // Pass social links for scraping
                })
            });

            if (!response.ok) {
                throw new Error(`Backend enrichment failed: ${response.statusText}`);
            }

            const enrichedData = await response.json();

            if (enrichedData.googlePlaces && !enrichedData.googlePlaces.error) {
                profile.googlePlaces = enrichedData.googlePlaces;
            }
            if (enrichedData.serpData && !enrichedData.serpData.error) {
                profile.serpData = enrichedData.serpData;
            }
            if (enrichedData.socialMediaMetrics) {
                profile.socialMediaMetrics = enrichedData.socialMediaMetrics;
            }
            profile.enrichmentTimestamp = enrichedData.timestamp;

            return profile;
        }

        // ============================================================================
        // MAIN APP COMPONENT
        // ============================================================================

        function App() {
            // Business Profile State
            const [profileText, setProfileText] = useState(JSON.stringify(SAMPLES["Digital Agency"], null, 2));
            const [selectedSample, setSelectedSample] = useState("Digital Agency");
            const [enriching, setEnriching] = useState(false);
            const [enrichStatus, setEnrichStatus] = useState("");
            const [hideBusinessName, setHideBusinessName] = useState(false);

            // SWOT State
            const [swotProvider, setSwotProvider] = useState("openai");
            const [swotOutput, setSwotOutput] = useState("");
            const [swotGenerating, setSwotGenerating] = useState(false);

            // Description State
            const [descProvider, setDescProvider] = useState("openai");
            const [descOutput, setDescOutput] = useState("");
            const [descGenerating, setDescGenerating] = useState(false);

            // Load Sample
            const handleLoadSample = (sampleName) => {
                setSelectedSample(sampleName);
                setProfileText(JSON.stringify(SAMPLES[sampleName], null, 2));
                setEnrichStatus("");
            };

            // Enrich Data
            const handleEnrich = async () => {
                try {
                    setEnriching(true);
                    setEnrichStatus("Enriching data...");

                    const profile = JSON.parse(profileText);
                    const enrichedProfile = await enrichWithBackend(profile);

                    setProfileText(JSON.stringify(enrichedProfile, null, 2));
                    setEnrichStatus("✓ Data enriched successfully!");
                } catch (error) {
                    setEnrichStatus(`✗ Enrichment failed: ${error.message}`);
                } finally {
                    setEnriching(false);
                }
            };

            // Generate SWOT
            const handleGenerateSWOT = async () => {
                try {
                    setSwotGenerating(true);
                    setSwotOutput("Generating SWOT analysis...");

                    const profile = JSON.parse(profileText);
                    profile.hideBusinessName = hideBusinessName; // Add hide flag to profile
                    let result;

                    if (swotProvider === "openai") {
                        result = await generateSWOTWithOpenAI(profile);
                    } else {
                        result = await generateSWOTWithPerplexity(profile);
                    }

                    setSwotOutput(result);
                } catch (error) {
                    setSwotOutput(`Error: ${error.message}`);
                } finally {
                    setSwotGenerating(false);
                }
            };

            // Generate Description
            const handleGenerateDescription = async () => {
                try {
                    setDescGenerating(true);
                    setDescOutput("Generating business description...");

                    const profile = JSON.parse(profileText);
                    profile.hideBusinessName = hideBusinessName; // Add hide flag to profile
                    let result;

                    if (descProvider === "openai") {
                        result = await generateDescriptionWithOpenAI(profile);
                    } else {
                        result = await generateDescriptionWithPerplexity(profile);
                    }

                    setDescOutput(result);
                } catch (error) {
                    setDescOutput(`Error: ${error.message}`);
                } finally {
                    setDescGenerating(false);
                }
            };

            // Copy to Clipboard
            const handleCopy = (text) => {
                navigator.clipboard.writeText(text);
                alert("Copied to clipboard!");
            };

            // Download
            const handleDownload = (content, filename) => {
                const blob = new Blob([content], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                URL.revokeObjectURL(url);
            };

            return (
                <div className="min-h-screen bg-gray-50 p-6">
                    <div className="max-w-7xl mx-auto">
                        <h1 className="text-3xl font-bold mb-6 text-gray-800">SWOT & AI Description Generator</h1>

                        {/* Business Profile Section */}
                        <div className="bg-white rounded-lg shadow p-6 mb-6">
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="text-xl font-semibold">Business Profile (JSON)</h2>
                                <div className="flex gap-2">
                                    <select
                                        value={selectedSample}
                                        onChange={(e) => handleLoadSample(e.target.value)}
                                        className="px-3 py-2 border rounded"
                                    >
                                        {Object.keys(SAMPLES).map(name => (
                                            <option key={name} value={name}>{name}</option>
                                        ))}
                                    </select>
                                    <button
                                        onClick={handleEnrich}
                                        disabled={enriching}
                                        className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 disabled:bg-gray-400"
                                    >
                                        {enriching ? "Enriching..." : "🔍 Enrich Data"}
                                    </button>
                                </div>
                            </div>
                            {enrichStatus && (
                                <div className="mb-3 text-sm text-blue-600">{enrichStatus}</div>
                            )}
                            <textarea
                                value={profileText}
                                onChange={(e) => setProfileText(e.target.value)}
                                className="w-full h-64 p-3 border rounded font-mono text-sm"
                                style={{ resize: 'vertical' }}
                            />
                            <div className="mt-3">
                                <label className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
                                    <input
                                        type="checkbox"
                                        checked={hideBusinessName}
                                        onChange={(e) => setHideBusinessName(e.target.checked)}
                                        className="w-4 h-4"
                                    />
                                    <span>Hide business name in outputs (for confidential sales)</span>
                                </label>
                            </div>
                        </div>

                        {/* Side-by-Side: SWOT and Description */}
                        <div className="grid grid-cols-2 gap-6">

                            {/* SWOT Generation */}
                            <div className="bg-white rounded-lg shadow p-6">
                                <h2 className="text-xl font-semibold mb-4">SWOT Generation</h2>

                                <div className="space-y-3 mb-4">
                                    <div>
                                        <label className="block text-sm font-medium mb-1">LLM Provider</label>
                                        <select
                                            value={swotProvider}
                                            onChange={(e) => setSwotProvider(e.target.value)}
                                            className="w-full px-3 py-2 border rounded"
                                        >
                                            <option value="openai">OpenAI</option>
                                            <option value="perplexity">Perplexity</option>
                                        </select>
                                    </div>
                                    <button
                                        onClick={handleGenerateSWOT}
                                        disabled={swotGenerating}
                                        className="w-full px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 disabled:bg-gray-400"
                                    >
                                        {swotGenerating ? "Generating..." : "Generate SWOT"}
                                    </button>
                                </div>

                                <div className="mb-2 flex gap-2">
                                    <button
                                        onClick={() => handleCopy(swotOutput)}
                                        disabled={!swotOutput}
                                        className="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300 disabled:bg-gray-100 text-sm"
                                    >
                                        📋 Copy
                                    </button>
                                    <button
                                        onClick={() => handleDownload(swotOutput, 'swot_analysis.md')}
                                        disabled={!swotOutput}
                                        className="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300 disabled:bg-gray-100 text-sm"
                                    >
                                        💾 Download
                                    </button>
                                </div>

                                <textarea
                                    value={swotOutput}
                                    readOnly
                                    placeholder="Generated SWOT will appear here..."
                                    className="w-full h-96 p-3 border rounded font-mono text-sm bg-gray-50"
                                    style={{ resize: 'vertical' }}
                                />
                            </div>

                            {/* AI Description Writer */}
                            <div className="bg-white rounded-lg shadow p-6">
                                <h2 className="text-xl font-semibold mb-4">AI Description Writer</h2>

                                <div className="space-y-3 mb-4">
                                    <div>
                                        <label className="block text-sm font-medium mb-1">LLM Provider</label>
                                        <select
                                            value={descProvider}
                                            onChange={(e) => setDescProvider(e.target.value)}
                                            className="w-full px-3 py-2 border rounded"
                                        >
                                            <option value="openai">OpenAI</option>
                                            <option value="perplexity">Perplexity</option>
                                        </select>
                                    </div>
                                    <button
                                        onClick={handleGenerateDescription}
                                        disabled={descGenerating}
                                        className="w-full px-4 py-2 bg-purple-600 text-white rounded hover:bg-purple-700 disabled:bg-gray-400"
                                    >
                                        {descGenerating ? "Generating..." : "Generate Description"}
                                    </button>
                                </div>

                                <div className="mb-2 flex gap-2">
                                    <button
                                        onClick={() => handleCopy(descOutput)}
                                        disabled={!descOutput}
                                        className="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300 disabled:bg-gray-100 text-sm"
                                    >
                                        📋 Copy
                                    </button>
                                    <button
                                        onClick={() => handleDownload(descOutput, 'business_description.txt')}
                                        disabled={!descOutput}
                                        className="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300 disabled:bg-gray-100 text-sm"
                                    >
                                        💾 Download
                                    </button>
                                </div>

                                <textarea
                                    value={descOutput}
                                    onChange={(e) => setDescOutput(e.target.value)}
                                    placeholder="Generated description will appear here..."
                                    className="w-full h-96 p-3 border rounded font-mono text-sm"
                                    style={{ resize: 'vertical' }}
                                />
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
